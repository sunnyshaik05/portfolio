<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Sunny Shaik</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap');

    *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
    body{background:#7a568e;color:#fff;}
     /* Navbar */
    .navbar{

      position:fixed;top:0;left:0;width:100%;
      padding: 20px 75%;display:flex;justify-content:space-between;align-items:center;
      background:#1f242d;
      z-index:100;
    }
    .navbar .logo{font-size:28px;font-weight:700;color:#eeabf4;}
    .navbar ul{display:flex;}
    .navbar ul li{list-style:none;margin-left:30px;}
    .navbar ul li a{font-size:18px;font-weight:500;color:#fff;transition:.3s;}
    .navbar ul li a:hover,.navbar ul li a.active{color:#eeabf4;}
    .navbar ul li a.active{ text-decoration: none; }

     /* Contact Section */
     .contact {
      min-height: 100vh;
      padding: 80px 9%;
      background: #7a568e;
      color: #fff;
      text-align: center;
    }
   
    .contact {
      min-height: 100vh;
      padding: 80px 9%;
      background: #7a568e;
      color: #fff;
      text-align: center;
    }
    .contact .section-title {
      font-size: 40px;
      margin-bottom: 40px;
      color: #eeabf4;
    }
    .contact-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 40px;
    }
    .contact-info {
      flex: 1;
      min-width: 250px;
      text-align: left;
    }
    .contact-info p {
      font-size: 18px;
      margin: 10px 0;
    }
    .contact-info i {
      color: #eeabf4;
      margin-right: 10px;
    }
    .contact-info a {
      color: #eeabf4;
      transition: .3s;
    }
    .contact-info a:hover { text-decoration: underline; }

    .contact-form {
      flex: 1;
      min-width: 300px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .contact-form input,
    .contact-form textarea {
      padding: 12px;
      border: 2px solid #eeabf4;
      border-radius: 10px;
      background: #1f242d;
      color: #fff;
      font-size: 16px;
    }
    .contact-form input:focus,
    .contact-form textarea:focus {
      outline: none;
      border-color: #fff;
      box-shadow: 0 0 10px #eeabf4;
    }
    .btn {
      display:inline-block;background:#eeabf4;padding:10px 30px;
      border:2px solid #eeabf4;border-radius:40px;box-shadow:0 0 10px #eeabf4;
      font-size:16px;font-weight:600;color:black;transition:.5s;
    }
    .btn:hover{background:transparent;color:#eeabf4;box-shadow:none;}
  </style>
</head>
<body>
   <!-- Navbar -->
  <nav class="navbar">
    
    <ul>
      <li><a href="index.html" class="active">Home</a></li>
    </ul>
  </nav>
  
  <!-- Contact Section -->
  <section class="contact" id="contact">
    <h2 class="section-title">Contact Me</h2>
    <div class="contact-container">

      <!-- Contact Info -->
      <div class="contact-info">
        <p><i class="fa-solid fa-envelope"></i> Email: sunnyshaik2005@gmail.com</p>
        <p><i class="fa-brands fa-linkedin"></i> LinkedIn: 
          <a href="https://www.linkedin.com/in/sunny-shaik-577ab8372">Sunny Shaik</a>
        </p>
        <p><i class="fa-brands fa-github"></i> GitHub: 
          <a href="https://github.com/sunnyshaik05">sunnyshaik05</a>
        </p>
      </div>

      <!-- Contact Form -->
      <form class="contact-form">
        <input type="text" placeholder="Your Name" required>
        <input type="email" placeholder="Your Email" required>
        <textarea rows="5" placeholder="Your Message" required></textarea>
        <button type="submit" class="btn">Send Message</button>
      </form>

    </div>
  </section>
</body>
</html>
